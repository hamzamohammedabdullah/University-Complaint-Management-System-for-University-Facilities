{% extends 'layouts/base.html' %}
{% block title %}My Profile{% endblock %}

{% block content %}
<h4 class="fw-bold mb-1">My Profile</h4>
<p class="text-muted small mb-4">Update your personal information</p>

<div class="card border-0 shadow-sm" style="max-width:480px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">First Name</label>
        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Last Name</label>
        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Email</label>
        <input type="email" class="form-control" value="{{ user.email }}" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Phone</label>
        <input type="tel" name="phone" class="form-control" value="{{ user.phone }}">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Role</label>
        <input type="text" class="form-control" value="{{ user.role|capfirst }}" disabled>
      </div>
      <button type="submit" class="btn btn-primary fw-semibold">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
